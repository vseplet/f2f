<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>f2f-desktop</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div class="container">

    <div class="ax-frame ax-tabbar">
      <div class="ax-header">
        <div class="ax-tabs">
          <button type="button" data-tab="camp" class="ax-tab ax-tab-active">camp</button>
          <span class="ax-sep">·</span>
          <button type="button" data-tab="meet" class="ax-tab">meet</button>
        </div>
        <button id="btn-engine" type="button" class="ax-engine-btn state-loading">
          <span class="ax-engine-state">⋯</span>
          <span class="ax-engine-label">loading…</span>
          <span class="ax-engine-meta" id="engine-meta"></span>
        </button>
      </div>
    </div>

    <div id="tab-camp" class="tab-panel">
      <div class="ax-frame">
        <div class="ax-section">
          <div class="ax-section-title">
            <span>— identity</span>
          </div>
          <div class="ax-grid-2">
            <div class="ax-field">
              <label>name</label>
              <input id="camp-name" type="text" class="ax-input" placeholder="your nickname" autocomplete="off">
            </div>
            <div class="ax-field">
              <label>camp id</label>
              <input id="camp-id" type="text" class="ax-input" placeholder="camp id" autocomplete="off">
            </div>
          </div>
        </div>

        <div class="ax-section">
          <div class="ax-section-title">
            <span>— peers</span>
            <span class="ax-meta" id="peers-meta"></span>
          </div>
          <div id="peers-status" class="ax-section-status">stopped</div>
          <table id="peers-table" class="ax-peers hidden">
            <thead>
              <tr>
                <th class="ax-peers-dot"></th>
                <th>name</th>
                <th>tunnel ip</th>
                <th>endpoint</th>
                <th>last seen</th>
              </tr>
            </thead>
            <tbody id="peers-tbody"></tbody>
          </table>
          <div class="ax-section-status muted" style="margin-top:8px">lite client — UDP hole-punch only, no overlay routing</div>
        </div>
      </div>
    </div><!-- /#tab-camp -->

    <div id="tab-meet" class="tab-panel hidden">
      <div class="ax-frame">
        <div class="ax-panes">
          <div class="ax-pane ax-pane-screen hidden" id="ax-pane-you-screen" data-pane="you-screen">
            <div class="ax-pane-header">
              <span class="ax-pane-label"><span class="ax-corner">└</span><span class="ax-pane-host" id="ax-you-screen-host">you · screen</span></span>
              <button class="ax-pane-fs" data-fs="ax-video-you-screen" title="fullscreen">⛶</button>
            </div>
            <video id="ax-video-you-screen" autoplay muted playsinline></video>
            <div class="ax-pane-footer">
              <span class="ax-res" id="ax-res-you-screen">—</span>
            </div>
          </div>

          <div class="ax-pane ax-pane-screen hidden" id="ax-pane-peer-screen" data-pane="peer-screen">
            <div class="ax-pane-header">
              <span class="ax-pane-label"><span class="ax-corner">└</span><span class="ax-pane-host" id="ax-peer-screen-host">peer · screen</span></span>
              <button class="ax-pane-fs" data-fs="ax-video-peer-screen" title="fullscreen">⛶</button>
            </div>
            <video id="ax-video-peer-screen" autoplay playsinline></video>
            <div class="ax-pane-footer">
              <span class="ax-res" id="ax-res-peer-screen">—</span>
            </div>
          </div>

          <div class="ax-pane" id="ax-pane-you" data-pane="you">
            <div class="ax-pane-header">
              <span class="ax-pane-label"><span class="ax-corner">└</span><span class="ax-pane-host" id="ax-you-host">you @ localhost</span></span>
              <button class="ax-pane-fs" data-fs="ax-video-you" title="fullscreen">⛶</button>
            </div>
            <video id="ax-video-you" autoplay muted playsinline></video>
            <div class="ax-cam-off">
              <svg viewBox="0 0 40 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="5" width="26" height="20" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M28 11L38 6v18l-10-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
              <span>camera off</span>
            </div>
            <div class="ax-pane-footer">
              <span class="ax-res" id="ax-res-you">—</span>
            </div>
          </div>

          <div class="ax-pane" id="ax-pane-peer" data-pane="peer">
            <div class="ax-pane-header">
              <span class="ax-pane-label"><span class="ax-corner">└</span><span class="ax-pane-host" id="ax-peer-host">peer @ —</span></span>
              <button class="ax-pane-fs" data-fs="ax-video-peer" title="fullscreen">⛶</button>
            </div>
            <video id="ax-video-peer" autoplay playsinline></video>
            <div class="ax-cam-off">
              <svg viewBox="0 0 40 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="5" width="26" height="20" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M28 11L38 6v18l-10-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
              <span>camera off</span>
            </div>
            <div class="ax-pane-footer">
              <span class="ax-res" id="ax-res-peer">—</span>
            </div>
          </div>
        </div>

        <div class="ax-db">
          <span class="ax-db-min">—12 dB</span>
          <div class="ax-db-bars" id="ax-db-bars"></div>
          <span class="ax-db-max">+6</span>
        </div>

        <div class="ax-controls">
          <select id="ax-call-peer" class="ax-select">
            <option value="">— peer —</option>
          </select>
          <button id="ax-call-btn" class="ax-btn ax-btn-call">
            <span class="ax-btn-state">▶</span>
            <span class="ax-btn-label">call peer</span>
            <span class="ax-btn-meta" id="ax-call-meta"></span>
          </button>
          <button id="ax-mic-btn" class="ax-btn ax-btn-mic" disabled>
            <span class="ax-btn-state">●</span>
            <span>mic</span>
          </button>
          <button id="ax-cam-btn" class="ax-btn ax-btn-cam" disabled>
            <span class="ax-btn-state">□</span>
            <span>cam</span>
          </button>
          <button id="ax-share-btn" class="ax-btn ax-btn-share" disabled>
            <span class="ax-btn-state">▢</span>
            <span>share</span>
          </button>
          <div class="ax-vol">
            <span class="ax-vol-label">vol</span>
            <div class="ax-vol-track" id="ax-vol-track">
              <div class="ax-vol-fill" id="ax-vol-fill"></div>
            </div>
            <span class="ax-vol-value" id="ax-vol-value">80</span>
          </div>
        </div>

        <div class="ax-log">
          <div class="ax-log-header">
            <span>— stream · <span id="ax-log-count">0</span> lines</span>
            <button id="ax-log-clear" class="ax-log-clear">clear</button>
          </div>
          <div class="ax-log-body" id="ax-log-body"></div>
          <div class="ax-chat-input">
            <span class="ax-chat-prompt">›</span>
            <input id="ax-chat-input" type="text" autocomplete="off" placeholder="signal channel not wired yet" disabled />
          </div>
        </div>

      </div>
    </div><!-- /#tab-meet -->

  </div>
  <script src="./src/main.js" type="module"></script>
</body>
</html>
